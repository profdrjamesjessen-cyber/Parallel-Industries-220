========================= */

   ALIEN SYNTAX GLYPH RAIN
========================= */

    color: #00ff66;
    font-size: 14px;
    animation: fall linear infinite;
    opacity: 0.9;
    text-shadow: 0 0 5px #00ff66;

@keyframes fall {

    10% { opacity: 0.4; }
    100% { transform: translateY(110vh); opacity: 0; }

    function drawImageSequential(img, callback){
        ctx.clearRect(0,0,canvas.width,canvas.height);

        const scale = Math.min(canvas.width / img.width, canvas.height / img.height);
        const imgWidth = img.width * scale;
        const imgHeight = img.height * scale;
        const offsetX = (canvas.width - imgWidth)/2;
        const offsetY = (canvas.height - imgHeight)/2;

        const fragmentWidth = imgWidth / gridFragments;
        const fragmentHeight = fragmentWidth * (img.height / img.width);

        const cols = Math.ceil(imgWidth / fragmentWidth);
        const rows = Math.ceil(imgHeight / fragmentHeight);

        const order = [];
        for(let r=0;r<rows;r++){
            for(let c=0;c<cols;c++){
                order.push({
                    sx: c * (img.width / cols),
                    sy: r * (img.height / rows),
                    sw: img.width / cols,
                    sh: img.height / rows,
                    dx: offsetX + c*fragmentWidth,
                    dy: offsetY + r*fragmentHeight,
                    dw: fragmentWidth,
                    dh: fragmentHeight
                });
            }
        }

        shuffle(order);

        let step = 0;

        function drawStep(){
            for(let i=0;i<5;i++){
                if(step >= order.length){
                    // Fully assembled, draw final full image without grid/glow
                    ctx.clearRect(0,0,canvas.width,canvas.height);
                    ctx.drawImage(img, offsetX, offsetY, imgWidth, imgHeight);
                    if(callback) callback();
                    return;

                const jitterY = (Math.random()-0.5)*2;

                ctx.save();
                ctx.shadowColor = "#00ff66";
                ctx.shadowBlur = 4; // subtle glow
                ctx.globalAlpha = 0.8;
                ctx.drawImage(img, cell.sx, cell.sy, cell.sw, cell.sh, cell.dx+jitterX, cell.dy+jitterY, cell.dw, cell.dh);
                ctx.restore();

                step++;
            }
            requestAnimationFrame(drawStep);
        }
        drawStep();
    }

    function shuffle(array){
        for(let i=array.length-1;i>0;i--){
            const j = Math.floor(Math.random()*(i+1));
            [array[i],array[j]]=[array[j],array[i]];
        }
    }

        drawImageSequential(imgObjects[currentIndex], ()=>{
            setTimeout(showNextImage, 5000); // slower rotation: 5s per image fully visible
        });
    }

    // Initial draw
    drawImageSequential(imgObjects[currentIndex], ()=>{
        setTimeout(showNextImage, 5000);

async function sha256(str){
const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(str));
return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,"0")).join("");
}

const digest=await sha256(name+birth+serial);
const coreID="PI220-"+digest.slice(0,14).toUpperCase();

/* GRID */
let grid=Array.from({length:H},()=>Array(W).fill(" "));

/* TOP PANEL */
const topPanel=[
"PRIVATE EVENT",
""
];

for(let y=0;y<topPanel.length;y++){
for(let x=0;x<topPanel[y].length;x++){
if(x<W) grid[y][x]=topPanel[y][x];
}
}

/* BOTTOM PANEL */
const bottomPanel=[
"",
"",
"",
"ALIEN PASSPORT"
];

for(let y=0;y<bottomPanel.length;y++){
for(let x=0;x<bottomPanel[y].length;x++){
grid[H-4+y][x]=bottomPanel[y][x];
}
}

/* SYMBOL FIELD */
let i=0;
function pick(){
let v=parseInt(digest.substr((i++%digest.length),2),16);
return SYMBOLS[v%SYMBOLS.length];
}

for(let y=0;y<H;y++){
for(let x=0;x<W;x++){
if(y<4&&x<18) continue;
if(y>H-5&&x<18) continue;
grid[y][x]=pick();
}
}

/* RENDER */
const box=document.getElementById("gridBox");
box.innerHTML="";

for(let y=0;y<H;y++){
for(let x=0;x<W;x++){

const d=document.createElement("div");
d.className="cell";

if((y<4&&x<18)||(y>H-5&&x<18)){
d.classList.add("panel");
}

d.textContent=grid[y][x];
box.appendChild(d);
}
}

document.getElementById("out").innerText=
"CORE ID: "+coreID+"\nHASH: "+digest.slice(0,32);

}
};

/* =========================
   🔐 DATA LAYER — PHASE 2
========================= */

let dataLayerInterval = null;
let dataLayerActive = false;
let dataLayerMode = "normal";

/* START */
function startDataLayer(mode="normal"){

if(dataLayerActive){
log("DATA LAYER ALREADY ACTIVE");
return;
}

dataLayerActive = true;
dataLayerMode = mode;

log("DATA LAYER ACTIVATED [" + mode.toUpperCase() + "]");

/* REAL NETWORK INFO */
if(navigator.connection){
log("NETWORK: " + navigator.connection.effectiveType);
log("DOWNLINK: " + navigator.connection.downlink + " Mbps");
}

/* PUBLIC IP */
fetch("https://api.ipify.org?format=json")
.then(res=>res.json())
.then(d=>log("IP: " + d.ip))
.catch(()=>log("IP FETCH FAILED"));

/* LOOP */
dataLayerInterval = setInterval(runDataLayer, 2000);
}

/* STOP */
function stopDataLayer(){
if(dataLayerInterval){
clearInterval(dataLayerInterval);
dataLayerInterval = null;
dataLayerActive = false;
log("DATA LAYER STOPPED");
}
}

/* CORE ENGINE */
function runDataLayer(){

let cpu = (Math.random()*60+20).toFixed(2);
let packets = Math.floor(Math.random()*500+100);

const protocols = ["HTTP","HTTPS","TCP","UDP","DNS","QUIC"];
let proto = protocols[Math.floor(Math.random()*protocols.length)];

const services = ["CORE","AI","NODE","AUTH","SYNC","GRID"];
let svc = services[Math.floor(Math.random()*services.length)];

/* NORMAL MODE */
if(dataLayerMode === "normal"){
log("CPU " + cpu + "% | PKT " + packets + "/s | " + proto + " | " + svc);
}

/* DEEP MODE */
if(dataLayerMode === "deep"){
let ports = [21,22,80,443,8080,3306];
let port = ports[Math.floor(Math.random()*ports.length)];

log(
"DEEP SCAN → " +
"CPU " + cpu + "% | " +
"PORT " + port + " OPEN | " +
proto + " | " + svc
);
}

/* TRACE MODE */
if(dataLayerMode === "trace"){
let latency = (Math.random()*100).toFixed(1);

log(
"TRACE → " +
"LAT " + latency + "ms | " +
proto + " PACKET FLOW | NODE:" + Math.floor(Math.random()*50)
);
}

/* AI MODE */
if(dataLayerMode === "ai"){

let anomaly = Math.random();

if(anomaly > 0.85){
log("⚠ AI ALERT → ANOMALY DETECTED IN " + proto + " STREAM");
}else{
log("AI MONITOR → STABLE | CPU " + cpu + "%");
}

}
}

/* COMMAND SYSTEM */
window.runCommand=function(e){
if(e.key!=="Enter")return;

let cmd=e.target.value.trim().toLowerCase();

if(cmd==="/help"){
log("NAVIGATION: /home /projects /about /contact /passport");
log("COMMANDS: /help /log /status /ping /list -all /open id <serial> /datalayer /datalayer deep /datalayer trace /datalayer ai /datalayer stop ");
log("SECURITY TIERS: 0-5");

}

else if(cmd==="/log"){systemInfo();}
else if(cmd==="/list -all"){
projects.forEach(p=>log(p.name+" | "+p.serial));
  
}

else if(cmd.startsWith("/open id ")){
let s=cmd.replace("/open id ","").toUpperCase();
let i=projects.findIndex(p=>p.serial===s);
if(i!==-1) openProject(i);
else log("NOT FOUND");
}

  


else if(cmd==="/home")loadSection("HOME");
else if(cmd==="/projects")loadSection("PROJECTS");
else if(cmd==="/about")loadSection("ABOUT");
else if(cmd==="/contact")loadSection("CONTACT");
else if(cmd==="/passport")loadSection("PASSPORT");


/* DATA LAYER PHASE 2 */

else if(cmd==="/datalayer"){
startDataLayer("normal");
}

else if(cmd==="/datalayer deep"){
startDataLayer("deep");
}

else if(cmd==="/datalayer trace"){
startDataLayer("trace");
}

else if(cmd==="/datalayer ai"){
startDataLayer("ai");
}

else if(cmd==="/datalayer stop"){
stopDataLayer();
}

else log("UNKNOWN COMMAND");

e.target.value="";
};

   PI220 ADD-ON MODULE LAYER

const _loadSection = window.loadSection;
const _runCommand = window.runCommand;

/* EXTENDED SECTIONS */
window.loadSection = function(sec){

if(sec === "SECURITY"){
content.innerHTML = `<h2>SECURITY MATRIX</h2>`;
return;
}

if(sec === "NETWORK"){
content.innerHTML = `<h2>NETWORK LAYER</h2>`;
return;
}

if(sec === "SETTINGS"){
content.innerHTML = `<h2>SETTINGS PANEL</h2>`;
return;
}

return _loadSection(sec);
};

/* EXTENDED COMMANDS */
window.runCommand = function(e){
if(e.key !== "Enter") return;

let cmd = e.target.value.trim().toLowerCase();

if(cmd === "/security") loadSection("SECURITY");
else if(cmd === "/network") loadSection("NETWORK");
else if(cmd === "/settings") loadSection("SETTINGS");
else if(cmd === "/ping") log("PARALLEL INDUSTRIES 220:391 SERVERS 127.0.0.1 RESPONSE OK");
else if(cmd === "/status") log("ALL PI220 SYSTEMS OPERATIONAL");
else return _runCommand(e);

e.target.value="";
};

});
